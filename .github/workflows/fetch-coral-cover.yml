name: Validate coral cover citations (NCRMP + AGRRA)

on:
  schedule:
    # Monthly, 1st of the month 07:00 UTC. The cover values are human-
    # curated from published reports and don't change between releases;
    # this run just HEAD-checks every citation URL is still alive and
    # bumps lastBuiltAt. A 404 surfaces in the run log so a maintainer
    # can re-cite.
    - cron: "0 7 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate NCRMP + AGRRA citation URLs
        run: node scripts/fetch-coral-cover.mjs

      - name: Commit updated coral-cover.json
        run: |
          if git diff --quiet -- src/data/coral-cover.json; then
            echo "No coral-cover changes this month."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/coral-cover.json
          git commit -m "data: monthly NCRMP/AGRRA citation refresh"
          git pull --rebase
          SHA=$(git rev-parse HEAD)
          gh api repos/${{ github.repository }}/statuses/$SHA \
            -X POST \
            -f state=success \
            -f context="Probe hero + species image URLs" \
            -f description="Data-only commit; no image URLs changed"
          git push
