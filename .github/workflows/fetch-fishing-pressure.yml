name: Fetch fishing pressure (Global Fishing Watch)

on:
  schedule:
    # Weekly, Sunday 07:00 UTC. GFW publishes daily but our metric is
    # yearly fishing hours — daily refresh would burn API quota.
    - cron: "0 7 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch Global Fishing Watch apparent fishing effort
        env:
          GFW_API_TOKEN: ${{ secrets.GFW_API_TOKEN }}
        run: node scripts/fetch-fishing-pressure.mjs

      - name: Commit updated fishing-pressure.json
        run: |
          if git diff --quiet -- src/data/fishing-pressure.json; then
            echo "No fishing-pressure changes this week."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/fishing-pressure.json
          git commit -m "data: weekly GFW fishing-pressure refresh"
          git pull --rebase
          git push
