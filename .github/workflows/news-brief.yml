name: Scubaseason Watch (daily news brief)

on:
  schedule:
    # Daily at 06:00 UTC — after NOAA CRW's nightly publish, before the
    # site-discovery run at 07:00.
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm ci

      - name: Generate Scubaseason Watch brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/news-brief.mjs

      - name: Commit updated news brief
        run: |
          if git diff --quiet -- docs/news-brief.md; then
            echo "No news-brief changes today."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/news-brief.md
          git commit -m "news: daily Scubaseason Watch brief"
          git push
