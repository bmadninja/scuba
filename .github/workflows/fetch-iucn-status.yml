name: Fetch IUCN Red List status

on:
  schedule:
    # Weekly, Monday 07:00 UTC. IUCN re-assesses species every few
    # years — weekly is already more than enough to catch a category
    # change soon after it lands.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch IUCN Red List categories
        env:
          IUCN_API_KEY: ${{ secrets.IUCN_API_KEY }}
        run: node scripts/fetch-iucn-status.mjs

      - name: Commit updated iucn-status.json
        run: |
          if git diff --quiet -- src/data/iucn-status.json; then
            echo "No IUCN status changes this week."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/iucn-status.json
          git commit -m "data: weekly IUCN Red List refresh"
          git push
