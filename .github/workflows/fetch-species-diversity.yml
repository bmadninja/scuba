name: Fetch species diversity (iNaturalist)

on:
  schedule:
    # Weekly, Tuesdays at 07:00 UTC.
    - cron: "0 7 * * 2"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch species richness from iNaturalist
        run: node scripts/fetch-species-diversity.mjs

      - name: Commit updated species-diversity.json
        run: |
          if git diff --quiet -- src/data/species-diversity.json; then
            echo "No species diversity changes this run."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/species-diversity.json
          git commit -m "data: weekly iNaturalist species richness refresh"
          git pull --rebase
          git push
