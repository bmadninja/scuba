name: Fetch reef health (NOAA CRW)

on:
  schedule:
    # Daily at 06:30 UTC — NOAA CRW publishes once per day.
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch NOAA Coral Reef Watch thermal stress
        run: node scripts/fetch-reef-health-live.mjs

      - name: Commit updated reef-health.json
        run: |
          if git diff --quiet -- src/data/reef-health.json; then
            echo "No reef-health changes today."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/reef-health.json
          git commit -m "data: nightly NOAA CRW thermal-stress refresh"
          git pull --rebase
          git push
