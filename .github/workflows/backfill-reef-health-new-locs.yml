name: Backfill reef health for new locations

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Backfill reef-health records for new locations
        run: node scripts/backfill-reef-health-new-locs.mjs

      - name: Commit updated reef-health.json
        run: |
          if git diff --quiet -- src/data/reef-health.json; then
            echo "No new locations to backfill."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/reef-health.json
          git commit -m "data: backfill reef-health for new locations"
          git pull --rebase
          git push
